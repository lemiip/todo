<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <section class="bg-red-200 md:h-screen w-full ">
        <h1 class="text-center text-serif font-bold py-5 text-[2.3rem] text-emerald-400">TO-DO List</h1>
        <div class="w-full md:w-[400px] h-[450px] bg-lime-100 mx-auto rounded-xl flex flex-col">
            <form class="flex m-6 " id="addForm">
                <input class="border-1 border-emerald-500 w-full md:w-[300px] px-3 h-[40px] rounded-l-xl" type="text" placeholder="Enter your todo" id="addInput"/>
                <button class="w-[50px] cursor-pointer h-[40px] bg-teal-500 rounded-r-xl" id="addButton"><i class="fa-solid fa-magnifying-glass text-mauve-200"></i></button>
            </form>
            <ol class="flex flex-col gap-3 list-decimal list-inside  m-6">

            </ol>
            <button class="w-full md:w-[350px] md:mx-6 font-serif cursor-pointer bg-emerald-500 text-white py-2 rounded-xl" id="clearButton">Clear All</button>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
