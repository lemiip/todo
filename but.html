<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <button id="colorButton" class="w-[120px] h-[40px] rounded-xlborder-1 m-5 bg-white text-dark hover:bg-yellow-200">Change Color</button>
    <p></p>
<script>
const colorButton = document.getElementById('colorButton');
let isRed = false;
colorButton.addEventListener('click', () => {
    if(isRed) {
        colorButton.textContent = "Change Color";
    } else {
        colorButton.textContent = "Reset Color";
    isRed = !isRed;
    document.body.style.backgroundColor = isRed ? "#ff6347" : "#ff99a8";
});


</script>
</body>
</html>
